<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only root may own the name and run the daemon. -->
  <policy user="root">
    <allow own="io.github.berkmuftuoglu.MyAsus4Linux.Helper"/>
  </policy>

  <!-- Any user may call the methods; polkit decides whether the action is
       actually allowed. The daemon validates every value and writes only its
       own fixed sysfs paths. -->
  <policy context="default">
    <allow send_destination="io.github.berkmuftuoglu.MyAsus4Linux.Helper"
           send_interface="io.github.berkmuftuoglu.MyAsus4Linux.Helper"/>
    <allow send_destination="io.github.berkmuftuoglu.MyAsus4Linux.Helper"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="io.github.berkmuftuoglu.MyAsus4Linux.Helper"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>

</busconfig>
