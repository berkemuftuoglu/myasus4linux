# cargo-deny config: supply-chain gate run in CI (advisories, licenses, sources).
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# GPL-3.0 app; these are the permissive/compatible licenses our deps use.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "GPL-3.0-or-later",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
