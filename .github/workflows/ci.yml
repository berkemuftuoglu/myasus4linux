name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/gtk-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  # Verify the project still builds on its declared MSRV, not just stable.
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/gtk-deps
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked --all-targets

  # Fail on broken intra-doc links.
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/gtk-deps
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items

  # Supply chain: advisories, licenses, sources (config in deny.toml).
  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@master

  unused-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: bnjbvr/cargo-machete@main

  # The pure-logic modules and the privileged-op core contract must stay at 100%
  # line coverage. Excluded (can't meaningfully run on a runner): the GTK shell,
  # the I/O-mixed backend, and the daemon's thin sysfs/D-Bus glue (its logic
  # lives in the 100%-covered myasus-core).
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/gtk-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: pure logic + privileged core must stay 100%
        run: cargo llvm-cov --workspace --locked --fail-under-lines 100 --ignore-filename-regex 'src/(ui|main\.rs|config\.rs|backend)|crates/myasusd'

  # Build what we actually ship: the full Meson build (GUI + daemon + data).
  meson-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/gtk-deps
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pipx install meson
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: meson setup build -Dprofile=default
      - run: meson compile -C build
      - run: meson install -C build --destdir "$PWD/staging"
      - name: confirm the daemon binary got installed
        run: test -f "$PWD/staging/usr/local/libexec/myasusd"
