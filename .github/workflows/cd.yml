name: cd

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_ID: io.github.berkmuftuoglu.MyAsus4Linux
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/gtk-deps

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: build release
        run: APP_ID=$APP_ID cargo build --release --locked

      - name: assemble dist tree
        run: |
          dist="myasus4linux-${GITHUB_SHA::8}-x86_64-linux"
          install -Dm755 target/release/myasus4linux "$dist/bin/myasus4linux"
          install -Dm644 data/icons/$APP_ID.svg \
            "$dist/share/icons/hicolor/scalable/apps/$APP_ID.svg"
          install -Dm644 data/icons/$APP_ID-symbolic.svg \
            "$dist/share/icons/hicolor/symbolic/apps/$APP_ID-symbolic.svg"
          mkdir -p "$dist/share/applications"
          sed "s/@APP_ID@/$APP_ID/g" data/$APP_ID.desktop.in.in \
            > "$dist/share/applications/$APP_ID.desktop"
          install -Dm644 LICENSE "$dist/LICENSE"
          install -Dm644 README.md "$dist/README.md"
          tar czf "$dist.tar.gz" "$dist"
          echo "DIST=$dist" >> "$GITHUB_ENV"

      - name: verify the artifact
        run: |
          file "$DIST/bin/myasus4linux" | grep -q "ELF 64-bit"
          if ldd "$DIST/bin/myasus4linux" | grep -q "not found"; then
            echo "binary has unresolved shared libraries"
            ldd "$DIST/bin/myasus4linux" | grep "not found"
            exit 1
          fi
          test -s "$DIST.tar.gz"
          echo "packaged $DIST.tar.gz ($(du -h "$DIST.tar.gz" | cut -f1))"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST }}
          path: ${{ env.DIST }}.tar.gz

      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DIST }}.tar.gz
